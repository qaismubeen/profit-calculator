<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profit Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: #fff;
        padding: 10px;
    }

    .container {
        width: 100%;
        max-width: 500px;
        background: rgba(255,255,255,0.12);
        border-radius: 22px;
        padding: 30px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        backdrop-filter: blur(14px);
        box-sizing: border-box;
    }

    h1 {
        text-align: center;
        margin-bottom: 22px;
        font-size: 26px;
    }

    .field {
        margin-bottom: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        opacity: 0.85;
    }

    input, select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 15px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        margin-top: 12px;
        padding: 14px;
        border-radius: 14px;
        border: none;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: linear-gradient(135deg, #2e7d32, #43a047);
        color: #fff;
    }

    button:hover {
        opacity: 0.9;
    }

    .results {
        margin-top: 22px;
        display: grid;
        gap: 12px;
    }

    .box {
        padding: 14px 16px;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 500;
    }

    .heading {
        background: none;
        padding: 6px 0;
        font-size: 16px;
        font-weight: bold;
        text-align: center;
        letter-spacing: 0.5px;
    }

    .blue   { background: #0288d1; }
    .purple { background: #7b1fa2; }
    .red    { background: #c62828; }
    .green  { background: #2e7d32; }
    .orange { background: #ef6c00; }

    .footer {
        margin-top: 18px;
        text-align: center;
        font-size: 12px;
        opacity: 0.75;
    }

    @media (max-width: 600px) {
        .container {
            width: 95%;
            padding: 25px;
        }
        h1    { font-size: 24px; }
        label { font-size: 16px; }
        input, select { font-size: 18px; padding: 14px 12px; }
        button { font-size: 18px; padding: 16px; }
        .box   { font-size: 16px; padding: 14px 16px; }
        .heading { font-size: 20px; }
    }
</style>
</head>

<body>
<div class="container">
    <h1>Profit Calculator</h1>

    <div class="field">
        <label>Principal Amount (Rs)</label>
        <input id="principal" type="text" placeholder="1,000,000">
    </div>

    <div class="field">
        <label>Profit Rate (%)</label>
        <input id="rate" type="number" step="any" placeholder="11.4">
    </div>

    <div class="field">
        <label>WHT Category</label>
        <select id="taxType">
            <option value="15">Filer (15%)</option>
            <option value="30">Non-Filer (30%)</option>
        </select>
    </div>

    <button type="button" onclick="calculate()">Calculate</button>

    <div id="results" class="results"></div>

    <div class="footer">
        Developed by <b>Qais Mubeen</b>
    </div>
</div>

<script>
const principalInput = document.getElementById("principal");

principalInput.addEventListener("input", () => {
    let raw = principalInput.value.replace(/,/g, "");
    if (raw === "" || isNaN(raw)) return;
    principalInput.value = Number(raw).toLocaleString();
});

function calculate() {
    const pa      = Number(principalInput.value.replace(/,/g, ""));
    const pr      = Number(document.getElementById("rate").value);
    const taxRate = Number(document.getElementById("taxType").value);

    if (isNaN(pa) || pa < 0 || isNaN(pr) || pr < 0) {
        document.getElementById("results").innerHTML = "";
        return;
    }

    const pv_year     = pa * pr / 100;
    const pv_month    = pv_year / 12;
    const wht         = pv_year * taxRate / 100;
    const net_year    = pv_year - wht;
    const net_month   = net_year / 12;
    const total_month = pa + net_month;
    const total_year  = pa + net_year;

    document.getElementById("results").innerHTML = `
        <div class="box blue"><b>Principal Amount:</b> Rs ${pa.toLocaleString()}</div>
        <div class="box blue"><b>Profit Rate:</b> ${pr}%</div>

        <div class="heading">Without Withholding Tax</div>
        <div class="box purple"><b>Profit / Year:</b> Rs ${pv_year.toFixed(2)}</div>
        <div class="box purple"><b>Profit / Month:</b> Rs ${pv_month.toFixed(2)}</div>

        <div class="heading">With Withholding Tax (${taxRate}%)</div>
        <div class="box red"><b>Tax Amount:</b> Rs ${wht.toFixed(2)}</div>

        <div class="box green"><b>Net Profit / Year:</b> Rs ${net_year.toFixed(2)}</div>
        <div class="box green"><b>Net Profit / Month:</b> Rs ${net_month.toFixed(2)}</div>

        <div class="box orange"><b>Total After 1 Month:</b> Rs ${total_month.toFixed(2)}</div>
        <div class="box orange"><b>Total After 1 Year:</b> Rs ${total_year.toFixed(2)}</div>
    `;
}
</script>

</body>
</html>
