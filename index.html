<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profit Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <h1>Profit Calculator</h1>
    <p class="tagline">Accurate Profit Estimation with WHT Deduction</p>

    <div class="inputs">
        <input type="text" id="principal" placeholder="Principal Amount (Rs)">
        <input type="text" id="rate" placeholder="Profit Rate (%)">

        <select id="taxType">
            <option value="15">Filer (15% WHT)</option>
            <option value="30">Non-Filer (30% WHT)</option>
        </select>

        <button onclick="calculate()">Calculate</button>
    </div>

    <div class="results" id="results"></div>

    <footer>
        Developed & Designed by <strong>Qais Mubeen</strong>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
