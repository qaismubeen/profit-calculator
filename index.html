<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profit Calculator</title>

<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
        background:
            radial-gradient(circle at top left, #1d2671, transparent 40%),
            radial-gradient(circle at bottom right, #c33764, transparent 40%),
            linear-gradient(135deg, #141e30, #243b55);
        color: #fff;
    }

    .container {
        width: 480px;
        background: rgba(255,255,255,0.12);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 35px 70px rgba(0,0,0,0.45);
        backdrop-filter: blur(15px);
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 26px;
        letter-spacing: 1px;
    }

    .field {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        opacity: 0.85;
    }

    input, select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 15px;
    }

    button {
        width: 100%;
        margin-top: 12px;
        padding: 14px;
        border-radius: 16px;
        border: none;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        color: #fff;
    }

    button:hover {
        opacity: 0.9;
    }

    .section {
        margin-top: 22px;
        padding: 14px;
        border-radius: 16px;
    }

    .gross { background: rgba(0, 176, 255, 0.25); }
    .tax { background: rgba(229, 57, 53, 0.25); }
    .net { background: rgba(0, 200, 83, 0.25); }
    .final {
        background: linear-gradient(135deg, #ff9800, #ffc107);
        color: #222;
        font-weight: bold;
    }

    .section h3 {
        margin: 0 0 10px 0;
        font-size: 15px;
        letter-spacing: 0.5px;
    }

    .line {
        font-size: 14px;
        margin-bottom: 6px;
    }

    .footer {
        margin-top: 20px;
        text-align: center;
        font-size: 12px;
        opacity: 0.75;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Profit Calculator</h1>

    <div class="field">
        <label>Principal Amount (Rs)</label>
        <input id="principal" type="text" placeholder="1,000,000">
    </div>

    <div class="field">
        <label>Profit Rate (%)</label>
        <input id="rate" type="number" placeholder="12">
    </div>

    <div class="field">
        <label>WHT Category</label>
        <select id="taxType">
            <option value="15">Filer (15%)</option>
            <option value="30">Non-Filer (30%)</option>
        </select>
    </div>

    <button type="button" onclick="calculate()">Calculate</button>

    <div id="results"></div>

    <div class="footer">
        Designed & Developed by <b>Qais Mubeen</b>
    </div>
</div>

<script>
const principalInput = document.getElementById("principal");

principalInput.addEventListener("input", () => {
    let raw = principalInput.value.replace(/,/g, "");
    if (raw === "" || isNaN(raw)) return;
    principalInput.value = Number(raw).toLocaleString();
});

function calculate() {
    const pa = Number(principalInput.value.replace(/,/g, ""));
    const pr = Number(document.getElementById("rate").value);
    const taxRate = Number(document.getElementById("taxType").value);

    if (isNaN(pa) || pa < 0 || isNaN(pr) || pr < 0) {
        document.getElementById("results").innerHTML = "";
        return;
    }

    const pv_year = pa * pr / 100;
    const pv_month = pv_year / 12;
    const wht = pv_year * taxRate / 100;
    const net_year = pv_year - wht;
    const net_month = net_year / 12;
    const total_month = pa + net_month;
    const total_year = pa + net_year;

    document.getElementById("results").innerHTML = `
        <div class="section gross">
            <h3>Without WHT Tax</h3>
            <div class="line">Profit / Year: Rs ${pv_year.toLocaleString()}</div>
            <div class="line">Profit / Month: Rs ${pv_month.toLocaleString()}</div>
        </div>

        <div class="section tax">
            <h3>WHT Deduction (${taxRate}%)</h3>
            <div class="line">Tax Amount: Rs ${wht.toLocaleString()}</div>
        </div>

        <div class="section net">
            <h3>Net Profit After Tax</h3>
            <div class="line">Net / Year: Rs ${net_year.toLocaleString()}</div>
            <div class="line">Net / Month: Rs ${net_month.toLocaleString()}</div>
        </div>

        <div class="section final">
            <h3>Final Total Amount</h3>
            <div class="line">After 1 Month: Rs ${total_month.toLocaleString()}</div>
            <div class="line">After 1 Year: Rs ${total_year.toLocaleString()}</div>
        </div>
    `;
}
</script>

</body>
</html>
