<!DOCTYPE html>
<html>
<head>
    <title>Profit Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
    <h2>Profit Calculator</h2>

    <div class="inputs">
        <input type="text" id="principal" placeholder="Principal (Rs)">
        <input type="text" id="rate" placeholder="Rate %">
        <select id="taxType">
            <option value="15">Filer 15%</option>
            <option value="30">Non-Filer 30%</option>
        </select>
    </div>

    <br>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

    <p class="credit">Developed by Qais Mubeen</p>
</div>

<script src="script.js"></script>
</body>
</html>
