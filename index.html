<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profit Calculator</title>

<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: #fff;
    }

    .container {
        width: 480px;
        background: rgba(255,255,255,0.12);
        border-radius: 22px;
        padding: 30px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.45);
        backdrop-filter: blur(14px);
    }

    h1 {
        text-align: center;
        margin-bottom: 22px;
        font-size: 26px;
    }

    .field {
        margin-bottom: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        opacity: 0.85;
    }

    input, select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 15px;
    }

    button {
        width: 100%;
        margin-top: 12px;
        padding: 14px;
        border-radius: 14px;
        border: none;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        color: #fff;
    }

    .results {
        margin-top: 22px;
        display: grid;
        gap: 10px;
    }

    .box {
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 14px;
    }

    .heading {
        font-weight: bold;
        letter-spacing: 0.5px;
        opacity: 0.9;
    }

    .blue { background: rgba(0, 176, 255, 0.25); }
    .purple { background: rgba(156, 39, 176, 0.25); }
    .red { background: rgba(229, 57, 53, 0.25); }
    .green { background: rgba(0, 200, 83, 0.25); }
    .orange { background: rgba(255, 152, 0, 0.25); }

    .footer {
        margin-top: 18px;
        text-align: center;
        font-size: 12px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Profit Calculator</h1>

    <div class="field">
        <label>Principal Amount (Rs)</label>
        <input id="principal" type="text" placeholder="1,000,000">
    </div>

    <div class="field">
        <label>Profit Rate (%)</label>
        <input id="rate" type="number" placeholder="12">
    </div>

    <div class="field">
        <label>WHT Category</label>
        <select id="taxType">
            <option value="15">Filer (15%)</option>
            <option value="30">Non-Filer (30%)</option>
        </select>
    </div>

    <button type="button" onclick="calculate()">Calculate</button>

    <div id="results" class="results"></div>

    <div class="footer">
        Developed by <b>Qais Mubeen</b>
    </div>
</div>

<script>
const principalInput = document.getElementById("principal");

principalInput.addEventListener("input", () => {
    let raw = principalInput.value.replace(/,/g, "");
    if (raw === "" || isNaN(raw)) return;
    principalInput.value = Number(raw).toLocaleString();
});

function calculate() {
    const pa = Number(principalInput.value.replace(/,/g, ""));
    const pr = Number(document.getElementById("rate").value);
    const taxRate = Number(document.getElementById("taxType").value);

    if (isNaN(pa) || pa < 0 || isNaN(pr) || pr < 0) {
        document.getElementById("results").innerHTML = "";
        return;
    }

    const pv_year = pa * pr / 100;
    const pv_month = pv_year / 12;
    const wht = pv_year * taxRate / 100;
    const net_year = pv_year - wht;
    const net_month = net_year / 12;
    const total_month = pa + net_month;
    const total_year = pa + net_year;

    document.getElementById("results").innerHTML = `
        <div class="box blue"><b>Principal Amount:</b> Rs ${pa.toLocaleString()}</div>
        <div class="box blue"><b>Profit Rate:</b> ${pr}%</div>

        <div class="box heading purple">Without Withholding Tax</div>
        <div class="box purple"><b>Profit / Year:</b> Rs ${pv_year.toLocaleString()}</div>
        <div class="box purple"><b>Profit / Month:</b> Rs ${pv_month.toLocaleString()}</div>

        <div class="box heading red">With Withholding Tax (${taxRate}%)</div>
        <div class="box red"><b>Tax Amount:</b> Rs ${wht.toLocaleString()}</div>

        <div class="box green"><b>Net Profit / Year:</b> Rs ${net_year.toLocaleString()}</div>
        <div class="box green"><b>Net Profit / Month:</b> Rs ${net_month.toLocaleString()}</div>

        <div class="box orange"><b>Total After 1 Month:</b> Rs ${total_month.toLocaleString()}</div>
        <div class="box orange"><b>Total After 1 Year:</b> Rs ${total_year.toLocaleString()}</div>
    `;
}
</script>

</body>
</html>
