<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profit Calculator</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <div class="container">
        <h1>💰 Profit Calculator</h1>
        <p class="subtitle">With WHT Tax Deduction</p>

        <div class="card">
            <label>Principal Amount (Rs)</label>
            <input type="number" id="principal" placeholder="Enter principal amount">

            <label>Profit Rate (%)</label>
            <input type="number" id="rate" placeholder="Enter profit rate">

            <label>WHT Tax Category</label>
            <select id="taxType">
                <option value="15">Filer (15%)</option>
                <option value="30">Non-Filer (30%)</option>
            </select>

            <button onclick="calculateProfit()">Calculate Profit</button>
        </div>

        <div id="result" class="result-card"></div>

        <footer>
            <p>Built with ❤️ | C++ Logic → Web</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
