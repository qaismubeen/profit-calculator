<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profit Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Profit Calculator (15% WHT Tax)</h1>

    <div class="calculator">
        <label>Principal Amount (Rs):</label>
        <input type="number" id="principal" placeholder="Enter principal amount">

        <label>Profit Rate (%):</label>
        <input type="number" id="rate" placeholder="Enter profit rate">

        <button onclick="calculateProfit()">Calculate</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
